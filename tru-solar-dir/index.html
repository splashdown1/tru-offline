<html lang="en">
<head>

  <style>
    :root { --bg:#07090d;--surface:#0d1117;--surface2:#161b22;--border:#21262d;--text:#e6edf3;--muted:#7d8590;--reasoner:#58a6ff;--critic:#f78166;--arbiter:#7ee787;--pulse:#1f6feb;--accent:#238636; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:16px; }
    .logo { font-size:18px; font-weight:700; letter-spacing:2px; }
    .logo span { color:var(--reasoner); }
    .logo-sub { font-size:10px; color:var(--muted); letter-spacing:3px; margin-top:2px; }
    .pulse-ring { display:flex; align-items:center; gap:10px; }
    .pulse-circle { position:relative; width:44px; height:44px; }
    .pulse-circle .ring { position:absolute; inset:0; border-radius:50%; border:2px solid var(--pulse); opacity:0; animation:pulse-ring 3s ease-out infinite; }
    .pulse-circle .core { position:absolute; inset:6px; border-radius:50%; background:var(--pulse); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; }
    @keyframes pulse-ring { 0%{transform:scale(0.5);opacity:0.8} 100%{transform:scale(1.4);opacity:0} }
    .pulse-info .freq { font-size:13px; font-weight:700; }
    .pulse-info .meta { font-size:11px; color:var(--muted); }
    .main { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:200px; border-right:1px solid var(--border); overflow-y:auto; padding:12px 0; }
    .sidebar-title { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; padding:0 12px 8px; }
    .channel-btn { display:flex; align-items:center; justify-content:space-between; width:100%; padding:7px 10px; border:none; background:transparent; color:var(--text); font-size:12px; border-radius:6px; cursor:pointer; text-align:left; transition:background 0.15s; }
    .channel-btn:hover { background:var(--surface2); }
    .channel-btn.active { background:var(--surface2); color:var(--reasoner); }
    .channel-btn .hz { font-size:10px; color:var(--muted); font-family:monospace; }
    .channel-btn .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }
    .center { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
    .msg { display:flex; flex-direction:column; gap:6px; }
    .msg-label { display:flex; align-items:center; gap:6px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .msg-label .dot { width:6px; height:6px; border-radius:50%; }
    .msg-label.reasoner { color:var(--reasoner); }
    .msg-label.critic { color:var(--critic); }
    .msg-label.arbiter { color:var(--arbiter); }
    .msg-label.system { color:var(--muted); }
    .msg.reasoner .dot { background:var(--reasoner); }
    .msg.critic .dot { background:var(--critic); }
    .msg.arbiter .dot { background:var(--arbiter); }
    .msg-label .confidence { margin-left:auto; font-size:10px; color:var(--muted); font-weight:400; }
    .msg-body { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:13px; line-height:1.6; white-space:pre-wrap; max-width:85%; }
    .msg.reasoner .msg-body { border-left:3px solid var(--reasoner); }
    .msg.critic .msg-body { border-left:3px solid var(--critic); }
    .msg.arbiter .msg-body { border-left:3px solid var(--arbiter); }
    .msg.system .msg-body { background:var(--surface2); border-color:var(--border); font-size:12px; color:var(--muted); }
    .msg.user { align-items:flex-end; }
    .msg.user .msg-body { background:var(--surface2); border-left:3px solid var(--muted); max-width:75%; }
    .res-items { display:flex; flex-direction:column; gap:6px; }
    .res-item { background:var(--surface2); border-radius:6px; padding:8px 10px; }
    .res-item .rtitle { color:var(--text); font-size:12px; margin-bottom:2px; }
    .res-item .rdesc { color:var(--muted); font-size:11px; }
    .thinking { display:flex; align-items:center; gap:6px; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; font-size:12px; color:var(--muted); }
    .thinking-dots { display:flex; gap:3px; }
    .thinking-dots span { width:4px; height:4px; border-radius:50%; background:var(--muted); animation:dot 1.4s ease-in-out infinite; }
    .thinking-dots span:nth-child(2){animation-delay:0.2s}
    .thinking-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes dot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    .input-area { border-top:1px solid var(--border); padding:12px 16px; display:flex; gap:8px; background:var(--surface); flex-shrink:0; }
    .input-area textarea { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-size:13px; font-family:inherit; resize:none; min-height:42px; max-height:120px; outline:none; transition:border-color 0.15s; }
    .input-area textarea:focus { border-color:var(--reasoner); }
    .input-area textarea::placeholder { color:var(--muted); }
    .input-area button { padding:0 16px; background:var(--pulse); border:none; border-radius:8px; color:#fff; font-size:13px; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
    .input-area button:hover { opacity:0.85; }
    .input-area button:disabled { opacity:0.4; cursor:not-allowed; }
    .kb-btn { padding:0 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--muted); font-size:12px; cursor:pointer; white-space:nowrap; }
    .kb-btn:hover { border-color:var(--accent); color:var(--arbiter); }
    .knowledge-panel { position:fixed; top:0; right:0; width:380px; height:100vh; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; z-index:100; transform:translateX(100%); transition:transform 0.25s ease; }

    .kp-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .kp-header h3 { font-size:13px; font-weight:700; }
    .kp-close { background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; }
    .kp-body { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
    .kp-empty { color:var(--muted); font-size:12px; text-align:center; padding:40px 0; }
    .kb-entry { background:var(--surface2); border:1px solid var(--border); border-radius:7px; padding:8px 10px; }
    .kb-entry .key { color:var(--reasoner); font-weight:600; font-size:12px; margin-bottom:3px; }
    .kb-entry .def { color:var(--text); font-size:12px; line-height:1.5; }
    .kb-entry .meta { color:var(--muted); font-size:10px; margin-top:3px; display:flex; gap:8px; }
    .delete-btn { background:none; border:none; color:var(--critic); cursor:pointer; font-size:10px; }
    .kp-add { padding:12px 16px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
    .kp-add input, .kp-add textarea { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:7px 9px; color:var(--text); font-size:12px; font-family:inherit; width:100%; resize:none; }
    .kp-add input::placeholder, .kp-add textarea::placeholder { color:var(--muted); }
    .kp-add button { padding:7px; background:var(--accent); border:none; border-radius:6px; color:#fff; font-size:12px; font-weight:600; cursor:pointer; }
    .kp-footer { padding:10px 16px; border-top:1px solid var(--border); display:flex; gap:6px; }
    .kp-footer button { flex:1; padding:7px; border:none; border-radius:6px; font-size:12px; cursor:pointer; font-weight:600; }
    .kp-footer .exp { background:var(--surface2); border:1px solid var(--border); color:var(--text); }
    .kp-footer .imp { background:var(--pulse); color:#fff; }
    .import-hidden { display:none; }
    .res-bar { height:2px; background:var(--border); overflow:hidden; position:relative; }
    .res-bar::after { content:''; position:absolute; left:-60%; width:60%; height:2px; background:linear-gradient(90deg,transparent,var(--arbiter),transparent); animation:resonate 4s ease-in-out infinite; }
    @keyframes resonate { 0%{left:-60%} 100%{left:100%} }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; display:none; }
    .overlay.open { display:block; }
  </style>
</head>

function load(k, def) { try { return JSON.parse(localStorage.getItem(k) || def); } catch { return JSON.parse(def); } }
function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function init() {
  kb = load(KBK, '[]');
  hist = load(HK, '[]');
  chan = localStorage.getItem(CK) || 'news';
  renderChannels();
  renderMessages();
  renderKB();
  fetchPulse();
  setInterval(fetchPulse, 4000);
}

function renderChannels() {
  const el = document.getElementById('channelList');
  el.innerHTML = '';
  Object.keys(CHANNELS).forEach(k => {
    const b = document.createElement('button');
    b.className = 'channel-btn' + (k === chan ? ' active' : '');
    b.innerHTML = '<span class="dot"></span><span>' + k + '</span><span class="hz">' + CHANNELS[k].freq + 'hz</span>';
    b.onclick = () => { chan = k; localStorage.setItem(CK, k); document.querySelectorAll('.channel-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); };
    el.appendChild(b);
  });
}

function renderMessages() {
  const box = document.getElementById('messages');
  box.innerHTML = '';

    if (m.type === 'user') {
      d.className = 'msg user';
      d.innerHTML = '<div class="msg-body">' + esc(m.text) + '</div>';
    } else if (m.type === 'reasoner') {
      d.className = 'msg reasoner';
      d.innerHTML = '<div class="msg-label reasoner"><span class="dot"></span>Reasoner</div><div class="msg-body">' + esc(m.text) + '</div>';
    } else if (m.type === 'critic') {
      d.className = 'msg critic';
      d.innerHTML = '<div class="msg-label critic"><span class="dot"></span>Critic</div><div class="msg-body">' + esc(m.text) + '</div>';
    } else if (m.type === 'arbiter') {
      d.className = 'msg arbiter';
      d.innerHTML = '<div class="msg-label arbiter"><span class="dot"></span>Arbiter<span class="confidence">' + (m.conf||0) + '%</span></div><div class="msg-body">' + esc(m.text) + '</div>';
    } else if (m.type === 'system') {
      d.className = 'msg system';
      d.innerHTML = '<div class="msg-label system">System</div><div class="msg-body">' + esc(m.text) + '</div>';
    } else if (m.type === 'resonance') {
      d.className = 'msg system';
      let items = m.items.map(i => '<div class="res-item"><div class="rtitle">' + esc(i.title) + '</div><div class="rdesc">' + esc(i.desc) + '</div></div>').join('');
      d.innerHTML = '<div class="msg-label system">Channel: ' + esc(m.channel) + '</div><div class="res-items">' + items + '</div>';
    }
    box.appendChild(d);
  });
  box.scrollTop = box.scrollHeight;
}

async function fetchPulse() {
  try {
    const r = await fetch(API + '/pulse');
    if (!r.ok) return;
    const d = await r.json();
    tick = d.tick;
    document.getElementById('freq').textContent = d.freq;
    document.getElementById('freqLabel').textContent = d.freq + ' hz';
    document.getElementById('tickLabel').textContent = 'tick ' + d.tick + ' · ' + Math.round(d.resonance*100) + '% resonance';
    document.getElementById('statusLabel').textContent = '23 channels · online';
  } catch(e) {
    tick++;
    const freqs = [432,528,639,741,852];
    const f = freqs[tick % freqs.length];
    document.getElementById('freq').textContent = f;
    document.getElementById('freqLabel').textContent = f + ' hz';
    document.getElementById('tickLabel').textContent = 'tick ' + tick + ' · offline mode';
    document.getElementById('statusLabel').textContent = '23 channels · offline';
  }
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || busy) return;
  input.value = '';
  busy = true;
  hist.push({ type: 'user', text, ts: Date.now() });
  save(HK, hist);
  renderMessages();
  showThinking();

  try {
    const r = await fetch(API + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: text, channel: chan, memory: kb })
    });
    if (!r.ok) throw new Error('API error: ' + r.status);
    const d = await r.json();
    removeThinking();

    if (d.reasoner) hist.push({ type: 'reasoner', text: d.reasoner });
    if (d.critic) hist.push({ type: 'critic', text: d.critic });
    if (d.arbiter) hist.push({ type: 'arbiter', text: d.arbiter, conf: d.confidence });
    if (d.channelData && d.channelData.length) hist.push({ type: 'resonance', channel: chan, items: d.channelData });

    if (d.newNodes && d.newNodes.length) {
      d.newNodes.forEach(n => { if (!kb.find(k => k.key === n.key)) kb.push(n); });
      save(KBK, kb);
      renderKB();
      hist.push({ type: 'system', text: 'Added ' + d.newNodes.length + ' node(s) to knowledge bank.' });
    }

    save(HK, hist);
    renderMessages();
  } catch(e) {
    removeThinking();
    hist.push({ type: 'system', text: 'Error: ' + e.message + ' — running in offline mode.' });
    save(HK, hist);
    renderMessages();
  }
  busy = false;
}

function showThinking() {
  const box = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'thinking';
  d.id = 'thinking';
  d.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>Reasoning through channels...';
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}
function removeThinking() { const t = document.getElementById('thinking'); if (t) t.remove(); }

function renderKB() {
  const list = document.getElementById('kbList');
  if (!kb.length) { list.innerHTML = '<div class="kp-empty">Knowledge bank empty.<br/>Add nodes below.</div>'; return; }
  list.innerHTML = '';
  kb.forEach((n, i) => {
    const d = document.createElement('div');
    d.className = 'kb-entry';
    d.innerHTML = '<div class="key">' + esc(n.key) + '</div><div class="def">' + esc(n.definition||n.def||'') + '</div><div class="meta"><span>score:' + (n.score||5) + '</span><span>uses:' + (n.accesses||0) + '</span><button class="delete-btn" onclick="delKB(' + i + ')">x</button></div>';
    list.appendChild(d);
  });
}
function delKB(i) { kb.splice(i,1); save(KBK, kb); renderKB(); }

document.getElementById('kbBtn').onclick = () => { document.getElementById('kbPanel').classList.add('open'); document.getElementById('overlay').classList.add('open'); };
document.getElementById('kbClose').onclick = document.getElementById('overlay').onclick = () => { document.getElementById('kbPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); };
document.getElementById('kbAdd').onclick = () => {
  const key = document.getElementById('kbKey').value.trim().toLowerCase().replace(/\s+/g, '-');
  const def = document.getElementById('kbDef').value.trim();
  const score = parseInt(document.getElementById('kbScore').value) || 5;
  if (!key || !def) return;
  if (kb.find(k => k.key === key)) { alert('Key exists.'); return; }
  kb.push({ key, definition: def, score, accesses: 0 });
  save(KBK, kb);
  document.getElementById('kbKey').value = '';
  document.getElementById('kbDef').value = '';
  document.getElementById('kbScore').value = '5';
  renderKB();
};
document.getElementById('kbExport').onclick = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(kb, null, 2)], {type:'application/json'})); a.download = 'tru-kb.json'; a.click(); };
document.getElementById('kbImport').onclick = () => document.getElementById('kbImportFile').click();
document.getElementById('kbImportFile').onchange = e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const arr = Array.isArray(data) ? data : (data.entries||[]);
      arr.forEach(n => { if (n.key && (n.definition||n.def)) { if (!kb.find(k=>k.key===n.key)) kb.push(n); } });
      save(KBK, kb); renderKB();
    } catch(err) { alert('Invalid JSON.'); }
  };
  reader.readAsText(file);
};
document.getElementById('sendBtn').onclick = send;
document.getElementById('input').onkeydown = e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); send(); } };
init();
</script>
</body>
