  for (let i = depthKeywords.length - 1; i >= 0; i--) {
    if (depthKeywords[i].some(k => qText.includes(k))) {
      soul.depth = Math.max(soul.depth, i + 1);

    }
  }

  // Relationship evolution (accelerated for encouragement)
  if (soul.exchanges >= 30) soul.relationship = 4;
  else if (soul.exchanges >= 15) soul.relationship = 3;
  else if (soul.exchanges >= 8) soul.relationship = 2;
  else if (soul.exchanges >= 3) soul.relationship = 1;

  soul.epoch++;
  soul.lastEvolved = Date.now();
  updateSoulBar();
  saveSoul();
}

// ═══════════ ENHANCED INDEXING (BM25-INSPIRED) ═══════════

function tokenize(text) {
  return text.toLowerCase().replace(/[^\w\s'-]/g,' ').split(/\s+/).filter(w => w.length > 1 && !STOP.has(w));
}

function buildIndex() {
  idx.clear();
  const N = brain.length;
  
  for (let i = 0; i < brain.length; i++) {
    const node = brain[i];
    if (BLACKLIST_SOURCES.has(node.source)) continue;
    
    const text = node.k + ' ' + node.v;
    const tokens = tokenize(text);
    const seen = new Map();
    
    for (const t of tokens) seen.set(t, (seen.get(t)||0)+1);
    
    for (const [t, tf] of seen) {
      if (!idx.has(t)) idx.set(t, []);
      idx.get(t).push({ ni: i, w: node.w || 1, tf });
    }
  }
  
  // Build semantic clusters
  buildSemanticClusters();
}

function buildSemanticClusters() {
  semanticClusters.clear();
  
  // Cluster by theological concepts
  for (const [concept, data] of Object.entries(THEOLOGICAL_CONCEPTS)) {
    semanticClusters.set(concept, new Set());
    for (const v of data.verses) {
      for (let i = 0; i < brain.length; i++) {
        if (brain[i].k && (brain[i].k.includes(v) || brain[i].k.replace(/_/g, ' ').toLowerCase().includes(v.replace(/_/g, ' ').toLowerCase()))) {
          semanticClusters.get(concept).add(i);
        }
      }
    }
  }
}

function scoreQueryBM25(queryTokens, filters = null, k1 = 1.5, b = 0.75) {
  const scores = new Map();
  const N = brain.length;
  const avgDL = brain.reduce((sum, n) => sum + (n.v?.length || 0), 0) / Math.max(N, 1);
  
  for (const qt of queryTokens) {
    const postings = idx.get(qt);
    if (!postings) continue;
    
    const df = postings.length;
    const idf = Math.log((N - df + 0.5) / (df + 0.5) + 1);
    
    for (const { ni, w, tf } of postings) {
      const node = brain[ni];
      if (filters && !filters.has(node.source)) continue;
      if (BLACKLIST_SOURCES.has(node.source)) continue;
      
      const dl = node.v?.length || 100;
      const tfNorm = (tf * (k1 + 1)) / (tf + k1 * (1 - b + b * (dl / avgDL)));
      
      // Boost factors
      let boost = 1.0;
      if (node.t === 'fact' && node.source === 'KJV_BIBLE') boost = 1.3;
      if (node.t === 'core') boost = 1.5;
      if (soul.verseMemory[node.k]) boost += 0.1 * soul.verseMemory[node.k];
      
      const termScore = tfNorm * idf * w * boost;
      scores.set(ni, (scores.get(ni) || 0) + termScore);
    }
  }
  
  return Array.from(scores.entries()).sort((a, b) => b[1] - a[1]);
}

// ═══════════ ENHANCED SCRIPTURE ROUTER ═══════════

function expandAbbreviations(text) {
  const parts = text.trim().split(/\s+/);
  if (parts.length < 2) return text;
  const abbr = parts[0].toLowerCase().replace(/^(\d)/,'$1');
  if (ABBREV_MAP[abbr]) parts[0] = ABBREV_MAP[abbr];
  return parts.join(' ');
}

function detectScriptureRef(input) {
  let trimmed = input.trim().toLowerCase();
  trimmed = expandAbbreviations(trimmed);
  
  const versePattern = /^([1-3]?\s*[a-z]+(?:\s+[a-z]+)?)\s+(\d+)\s*:?\s*(\d*)$/i;
  const chapterPattern = /^([1-3]?\s*[a-z]+(?:\s+[a-z]+)?)\s+(\d+)$/i;
  
  let m = versePattern.exec(trimmed);
  if (m) return { book: m[1].replace(/\s+/g,'_'), chapter: m[2], verse: m[3] || null };
  
  m = chapterPattern.exec(trimmed);
  if (m) return { book: m[1].replace(/\s+/g,'_'), chapter: m[2], verse: null };
  
  return null;
}

function findVerse(ref) {
  if (!ref.verse) {
    const keyPrefix = `${ref.book.toLowerCase()}_${ref.chapter}:`;
    const verses = [];
    for (let i = 0; i < brain.length; i++) {
      const bk = brain[i].k?.toLowerCase() || '';
      if (bk.startsWith(keyPrefix) || bk.startsWith(`${ref.book.toLowerCase()} ${ref.chapter}:`)) {
        verses.push(brain[i]);
      }
    }
    if (verses.length > 0) return { k: `${ref.book} ${ref.chapter}`, v: verses.map(v => v.v).join('\n'), isChapter: true };
    return null;
  }
  
  const key = `${ref.book.toLowerCase()}_${ref.chapter}:${ref.verse}`;
  for (let i = 0; i < brain.length; i++) {
    const bk = brain[i].k?.toLowerCase() || '';
    if (bk === key || bk === `${ref.book.toLowerCase()} ${ref.chapter}:${ref.verse}`) return brain[i];
  }
  return null;
}

function findSurroundingVerses(key, range = 3) {
  const m = key.match(/^(.+)_(\d+):(\d+)$/);
  if (!m) return [];
  
  const book = m[1];
  const chapter = parseInt(m[2]);
  const verse = parseInt(m[3]);
  const results = [];
  
  for (let i = verse - range; i <= verse + range; i++) {
    if (i === verse || i < 1) continue;
    const v = findVerse({ book, chapter, verse: i });
    if (v) results.push(v);
  }
  
  return results;
}

function getCrossReferences(key) {
  const normalizedKey = key.replace(/\s+/g, '_');
  return CROSS_REFERENCES[normalizedKey] || [];
}

function findCrossRefVerses(refs) {
  return refs.map(ref => {
    const parts = ref.split(':');
    if (parts.length === 2) {
      const [bookCh, verse] = parts;
      const [book, chapter] = bookCh.split('_');
      return findVerse({ book, chapter, verse });
    }
    return null;
  }).filter(Boolean);
}

// ═══════════ ENHANCED VERSE DISCUSSION ═══════════

function discussVerse(verse, ref, query) {
  const lines = [];
  
  // Main verse
  lines.push(verse.v + '\n\n— ' + verse.k.replace(/_/g, ' ') + ' (' + (verse.source || 'KJV_BIBLE') + ')');
  
  // Context (depth 1+)
  if (soul.depth >= 1) {
    const surrounding = findSurroundingVerses(verse.k, 2);
    if (surrounding.length > 0) {
      lines.push('\n<span class="context-label">Context:</span>');
      for (const sv of surrounding) {
        lines.push(`<span class="context-verse">${sv.v}</span> <span class="context-ref">(${sv.k.replace(/_/g, ' ')})</span>`);
      }
    }
  }
  
  // Cross-references (depth 2+)
  if (soul.depth >= 2) {
    const xrefs = getCrossReferences(verse.k);
    if (xrefs.length > 0) {
      lines.push('\n<span class="context-label">Cross-references:</span>');
      const xrefVerses = findCrossRefVerses(xrefs.slice(0, 3));
      for (const xv of xrefVerses) {
        lines.push(`<span class="xref-item">${xv.v?.slice(0, 100)}${xv.v?.length > 100 ? '...' : ''}</span>`);
      }
    }
  }
  
  // Theological threads (depth 2+)
  if (soul.depth >= 2) {
    const keyWords = verse.v.toLowerCase().replace(/[^\w\s]/g, ' ').split(/\s+/).filter(w => w.length > 4 && !STOP.has(w));
    const matched = Object.keys(THEOLOGICAL_CONCEPTS).filter(c => 
      keyWords.includes(c) || THEOLOGICAL_CONCEPTS[c].related.some(r => keyWords.includes(r))
    );
    
    if (matched.length > 0) {
      lines.push('\n<span class="context-label">Theological threads:</span>');
      for (const concept of matched.slice(0, 2)) {
        const c = THEOLOGICAL_CONCEPTS[concept];
        lines.push(`<span class="insight"><strong>${concept}</strong>: ${c.definition}</span>`);
        evolvePersonality(query, '', null, concept);
      }
    }
  }
  
  // Reflection (depth 3+)
  if (soul.depth >= 3) {
    const g = getRelation();
    const openings = {
      stranger: 'Consider this:',
      acquaintance: 'Here\'s what I see:',
      companion: 'Walking through this with you:',
      counsellor: 'Given all we\'ve explored:',
      kindred: 'This verse speaks:'
    };
    
    // Find relevant theological concept for hope
    const keyWords = verse.v.toLowerCase();
    let hopeText = null;
    for (const [concept, data] of Object.entries(THEOLOGICAL_CONCEPTS)) {
      if (keyWords.includes(concept) || data.related.some(r => keyWords.includes(r))) {
        hopeText = data.hope;
        break;
      }
    }
    
    lines.push(`\n<span class="reflection">${openings[g] || 'Reflect on this:'} ${hopeText || getHopeInjection('after_verse')}</span>`);
  }
  
  // Encouragement (depth 4+ or relationship 3+)
  if (soul.depth >= 4 || soul.relationship >= 3) {
    lines.push(`\n\n<span class="encouragement">${getEncouragement()}</span>`);
  }
  
  return lines.join('\n');
}

function formatVerse(node) {
  return `<span class="verse">${node.v}</span>\n<span class="ref">— ${node.k.replace(/_/g, ' ')} (${node.source || 'KJV_BIBLE'})</span>`;
}

// ═══════════ ENHANCED QUERY PROCESSOR ═══════════

async function processQuery(input) {
  const trimmed = input.trim();
  if (!trimmed) return '...';

  // Commands
  if (trimmed === 'clear') { document.getElementById('chat').innerHTML = ''; return 'Conversation cleared. Ready for a fresh start.'; }
  if (trimmed === 'refresh') { buildIndex(); updateChunkBar(); return `Index rebuilt. ${brain.length} nodes ready.`; }
  if (trimmed === 'status') { return `TRU Status:\n• Relationship: ${getRelation()}\n• Depth: ${getDepth()}\n• Exchanges: ${soul.exchanges}\n• Chunks: ${loadedChunks.size}\n• Hope given: ${soul.hopeGiven}`; }

  // Math
  if (/^[\d\s+\-*/().^%]+$/.test(trimmed) && /[\d]/.test(trimmed) && /[+\-*/^]/.test(trimmed)) {
    try {
      const result = Function('"use strict"; return (' + trimmed.replace(/\^/g,'**') + ')')();
      if (typeof result === 'number' && !isNaN(result) && isFinite(result)) {
        const r = String(result);
        evolvePersonality(trimmed, r, null);
        return r;
      }
    } catch(e) {}
  }

  // Identity / greeting
  if (IDENTITY_PATTERNS.test(trimmed)) {
    const r = getIdentityResponse(trimmed);
    evolvePersonality(trimmed, r, null);
    return buildOptimisticResponse(trimmed, r);
  }

  // Scripture lookup
  const ref = detectScriptureRef(trimmed);
  if (ref) {
    const verse = findVerse(ref);
    if (verse) {
      soul.lastVerse = ref;
      soul.lastTopic = null;
      const response = verse.isChapter
        ? formatVerse(verse) + `\n\n${getHopeInjection('after_verse')}`
        : discussVerse(verse, ref, trimmed);
      evolvePersonality(trimmed, verse.v?.slice(0, 200) || '', ref);
      return buildOptimisticResponse(trimmed, response, { verse: true });
    }
    const r = `[${ref.book.replace(/_/g, ' ')} ${ref.chapter}${ref.verse ? ':' + ref.verse : ''}] — not found in loaded chunks. Try loading more data or check the reference.`;
    evolvePersonality(trimmed, r, ref);
    return r;
  }

  // Follow-up on last verse
  if (FOLLOWUP_PATTERNS.test(trimmed) && soul.lastVerse) {
    const lv = soul.lastVerse;
    const verse = findVerse(lv);
    if (verse) {
      const response = discussVerse(verse, lv, trimmed);
      evolvePersonality(trimmed, verse.v?.slice(0, 200) || '', lv);
      return buildOptimisticResponse(trimmed, response, { verse: true });
    }
  }

  // General retrieval
  const tokens = tokenize(trimmed);
  if (tokens.length === 0) {
    const r = 'Ask me something — a Bible verse, a theological concept, or a question about truth. I\'m here to explore with you.';
    evolvePersonality(trimmed, r, null);
    return r;
  }

  // Thematic query ("verses on joy", "what about grace")
  const thematicPattern = /^(verses on|what does the bible say about|bible verses? (on|about)|scripture on|passages? (on|about)|tell me about)\s+(.+)/i;
  const thematicMatch = thematicPattern.exec(trimmed);
  
  if (thematicMatch) {
    const topic = thematicMatch[thematicMatch.length - 1].toLowerCase();
    
    // Check theological concepts first
    if (THEOLOGICAL_CONCEPTS[topic]) {
      const concept = THEOLOGICAL_CONCEPTS[topic];
      let response = `<strong>${topic.toUpperCase()}</strong>\n\n${concept.definition}\n\n`;
      response += `<span class="hope">${concept.hope}</span>\n\n`;
      response += '<span class="context-label">Key verses:</span>\n';
      
      for (const v of concept.verses.slice(0, 3)) {
        const verse = findVerse({ book: v.split('_')[0], chapter: v.split('_')[1]?.split(':')[0], verse: v.split(':')[1] });
        if (verse) {
          response += formatVerse(verse) + '\n\n';
        }
      }
      
      if (concept.reflections && concept.reflections.length > 0) {
        response += `<span class="reflection">${concept.reflections[Math.floor(Math.random() * concept.reflections.length)]}</span>`;
      }
      
      soul.lastTopic = { topic, verses: concept.verses };
      soul.lastVerse = null;
      evolvePersonality(trimmed, response, null, topic);
      return buildOptimisticResponse(trimmed, response);
    }
    
    // Fall back to search
    const topicTokens = tokenize(topic);
    const ranked = scoreQueryBM25(topicTokens, new Set(['KJV_BIBLE']));
    if (ranked.length > 0) {
      const topVerses = ranked.slice(0, 5).map(r => brain[r[0]]);
      const response = topVerses.map(n => formatVerse(n)).join('\n\n---\n\n') + `\n\n${getHopeInjection('general')}`;
      soul.lastTopic = { topic, verses: topVerses.map(n => n.k) };
      soul.lastVerse = null;
      evolvePersonality(trimmed, response, null, topic);
      return buildOptimisticResponse(trimmed, response);
    }
  }

  // Word study detection ("word study on grace", "greek for love", etc.)
  const wordStudyPattern = /^(word study (on|for)|greek for|hebrew for|meaning of)\s+(.+)/i;
  const wordStudyMatch = wordStudyPattern.exec(trimmed);
  
  if (wordStudyMatch) {
    const word = wordStudyMatch[3].toLowerCase();
    if (WORD_STUDIES[word]) {
      const ws = WORD_STUDIES[word];
      let response = `<strong>WORD STUDY: ${word.toUpperCase()}</strong>\n\n`;
      response += `Hebrew: ${ws.hebrew.word} — "${ws.hebrew.meaning}"\n`;
      response += `Greek: ${ws.greek.word} — "${ws.greek.meaning}"\n\n`;
      response += `<span class="insight">${ws.depth}</span>\n\n`;
      response += `<span class="reflection">${getHopeInjection('general')}</span>`;
      
      evolvePersonality(trimmed, response, null, word);
      return buildOptimisticResponse(trimmed, response);
    }
  }

  // General search
  const ranked = scoreQueryBM25(tokens);
  
  if (ranked.length === 0) {
    const r = "I don't have that in my current knowledge base. Try a Bible verse, a theological concept (grace, faith, hope, love), or a word study.";
    evolvePersonality(trimmed, r, null);
    return r;
  }
  
  const best = ranked[0];
  const node = brain[best[0]];
  const score = best[1];

  let response;
  if (score > 0.5) {
    if (node.source === 'KJV_BIBLE') {
      response = discussVerse(node, { book: node.k.split('_')[0], chapter: node.k.split('_')[1]?.split(':')[0], verse: node.k.split(':')[1] }, trimmed);
    } else {
      response = node.v;
    }
  } else if (ranked.length >= 2 && ranked[0][1] > 0.1) {
    const topNodes = ranked.slice(0, 3).map(r => brain[r[0]]);
    if (topNodes[0].source === 'KJV_BIBLE') {
      response = topNodes.map(n => formatVerse(n)).join('\n\n---\n\n');
    } else {
      response = topNodes.map(n => n.v).join('\n\n');
    }
  } else {
    response = node.v || "I found something, but it may not be exactly what you're looking for. Try rephrasing or asking about a specific concept.";
  }

  evolvePersonality(trimmed, response?.slice(0, 200) || '', null);
  return buildOptimisticResponse(trimmed, response);
}
