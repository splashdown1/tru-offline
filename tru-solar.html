<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRU — Dry Truth, Steady Nudge</title>
  <style>
    :root {
      --bg: #08090d;
      --panel: #0f1117;
      --border: #1e2230;
      --green: #00e87a;
      --amber: #f5a623;
      --red: #ff4757;
      --muted: #5a6275;
      --text: #d8dde8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }

    /* PULSE BAR */
    #pulse-bar {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
    }
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse-anim 2s infinite; }
    @keyframes pulse-anim { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }
    .freq-tag { color: var(--amber); font-weight: bold; }
    .mode-tag { color: var(--green); }

    /* LAYOUT */
    #app { display: grid; grid-template-columns: 260px 1fr 300px; grid-template-rows: 1fr auto; height: calc(100vh - 44px); }

    /* CHANNELS */
    #channels { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px; }
    #channels h3 { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
    .ch-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px; margin-bottom: 4px; border-radius: 6px;
      background: transparent; border: 1px solid transparent; color: var(--text);
      font-family: inherit; font-size: 12px; cursor: pointer; text-align: left; width: 100%;
      transition: all 0.15s;
    }
    .ch-btn:hover { background: #151820; border-color: var(--border); }
    .ch-btn.active { background: #0d1f15; border-color: var(--green); color: var(--green); }
    .ch-btn .freq { color: var(--muted); font-size: 10px; }
    .ch-btn.active .freq { color: var(--green); opacity: 0.6; }

    /* REASONING LAB */
    #reasoning {
      display: flex; flex-direction: column; overflow: hidden;
    }
    #debate {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg { padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); }
    .msg.reasoner { border-left: 3px solid #3b82f6; }
    .msg.critic { border-left: 3px solid var(--red); }
    .msg.arbiter { border-left: 3px solid var(--amber); }
    .msg.tru { border-left: 3px solid var(--green); }
    .msg.system { border: 1px dashed var(--muted); background: transparent; color: var(--muted); font-size: 11px; }
    .msg-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .reasoner .msg-label { color: #3b82f6; }
    .critic .msg-label { color: var(--red); }
    .arbiter .msg-label { color: var(--amber); }
    .tru .msg-label { color: var(--green); }

    /* INPUT */
    #input-bar { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--panel); display: flex; gap: 8px; }
    #user-input {
      flex: 1; background: #0a0d12; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: inherit; font-size: 13px; padding: 10px 14px;
      resize: none; min-height: 42px; max-height: 120px; outline: none;
    }
    #user-input:focus { border-color: var(--green); }
    .btn { padding: 10px 18px; border-radius: 8px; border: none; font-family: inherit; font-size: 12px; cursor: pointer; font-weight: bold; letter-spacing: 1px; }
    .btn-send { background: var(--green); color: #000; }
    .btn-send:hover { opacity: 0.85; }
    .btn-voice { background: var(--panel); color: var(--muted); border: 1px solid var(--border); }
    .btn-voice.active { border-color: var(--amber); color: var(--amber); }

    /* KNOWLEDGE BANK */
    #kb { background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; padding: 12px; }
    #kb h3 { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; }
    #kb-count { color: var(--green); }
    .kb-entry { padding: 8px 10px; margin-bottom: 6px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
    .kb-entry:hover { border-color: var(--green); }
    .kb-key { color: var(--amber); font-size: 11px; font-weight: bold; margin-bottom: 3px; }
    .kb-def { color: var(--text); font-size: 11px; line-height: 1.4; }
    .kb-score { float: right; color: var(--muted); font-size: 10px; }

    /* MODE BADGES */
    .mode-reasoner { background: #1a2a4a; color: #60a5fa; border: 1px solid #2563eb; }
    .mode-critic { background: #2a1a1a; color: #f87171; border: 1px solid #dc2626; }
    .mode-arbiter { background: #2a2a1a; color: #fbbf24; border: 1px solid #d97706; }

    /* CONFIDENCE */
    .confidence { font-size: 10px; color: var(--muted); margin-top: 6px; }
    .conf-high { color: var(--green); }
    .conf-mid { color: var(--amber); }
    .conf-low { color: var(--red); }

    /* INJECT BAR */
    #inject-bar { padding: 8px 16px; background: #0a0d12; border-top: 1px solid var(--border); display: flex; gap: 8px; font-size: 11px; }
    .inj-btn { background: var(--panel); border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; }
    .inj-btn:hover { border-color: var(--amber); color: var(--amber); }
  </style>
</head>

  const ql = q.toLowerCase();
  const stop = new Set(['what','is','the','a','an','of','to','in','for','how','why','when','who','where']);
  const qWords = ql.split(/\s+/).filter(w => w.length > 2 && !stop.has(w));

  return kb.map(node => {
    const kl = node.key.toLowerCase();
    const dl = (typeof node.definition === 'string' ? node.definition : '').toLowerCase();
    let score = 0;
    let matchType = '';

    // Exact key match = highest
    if (kl === ql) { score = 100; matchType = 'exact_key'; }
    else if (kl.includes(ql) || ql.includes(kl)) { score = 70; matchType = 'substring'; }
    else {
      let wordMatches = qWords.filter(w => kl.includes(w) || dl.includes(w)).length;
      score = (wordMatches / Math.max(qWords.length, 1)) * 60;
      matchType = wordMatches > 0 ? 'word_match' : 'none';
    }

    // Boost by score
    score += node.score * 3;

    return { node, score, matchType };
  })
  .filter(r => r.score > 0)
  .sort((a, b) => b.score - a.score)
  .slice(0, 8);
}

function reasonerAgent(question, channel) {
  const relevant = findRelevantNodes(question);
  const channelNodes = kb.filter(n => {
    const c = n.coil_key.slice(-3).charCodeAt(0) % 23;
    return Object.keys(CHANNELS)[c] === channel;
  }).slice(0, 3);

  if (!relevant.length && !channelNodes.length) {
    return { text: `Q: "${question}"\nChannel: ${channel}\n\nKnowledge bank has no direct match. Activating inferential mode — LOGOS will synthesize from first principles: truth, reason, sovereignty, dignity.\n\n[REASONER DONE]`, nodes: [] };
  }

  const top = relevant.slice(0, 5);
  let text = `Q: "${question}"\nChannel: ${channel}\n\n`;
  text += `Drawing from ${top.length} relevant nodes:\n\n`;

  top.forEach(r => {
    text += `[${r.node.key}] (score:${r.node.score} coil:${r.node.coil_key})\n${(typeof r.node.definition === 'string' ? r.node.definition : JSON.stringify(r.node.definition))}\n\n`;
  });

  // Synthesize
  const definitions = top.map(r => typeof r.node.definition === 'string' ? r.node.definition : '').filter(Boolean);
  const synthesis = definitions.length > 0
    ? `Based on ${top.length} nodes: ${top[0].node.key} — ${top[0].node.definition.split('.')[0]}.`
    : 'Inferential synthesis required.';

  text += `Synthesis: ${synthesis}\n\n[REASONER DONE]`;

  return { text, nodes: top.map(r => r.node.key) };
}

function criticAgent(question, reasonerOutput, channel) {
  const rText = reasonerOutput.text;
  const nodes = reasonerOutput.nodes;

  let critique = `CRITIQUE of Reasoner:\n\n`;

  if (nodes.length === 0) {
    critique += `- No nodes matched directly — inferential mode was used. This is acceptable but should be flagged.\n`;
  }

  if (nodes.length > 0 && nodes.length < 3) {
    critique += `- Thin grounding — only ${nodes.length} nodes found. Consider whether more nodes are relevant.\n`;
  }

  if (rText.includes('Activating inferential mode')) {
    critique += `- Inferential synthesis activated. This is legitimate when no direct match exists, but the answer may lack the precision of a grounded response.\n`;
  }

  const topNode = nodes[0];
  if (topNode) {
    critique += `- Primary node: ${topNode}. Is this the most relevant source? Verify the definition directly bears on the question.\n`;
  }

  critique += `\nVerdict: Reasoner output is ${nodes.length > 0 ? 'acceptable' : 'speculative — inferential mode used'}. Proceeding to Arbiter.\n\n[CRITIC DONE]`;

  return critique;
}

function arbiterAgent(question, reasonerOutput, criticOutput, channel) {
  const synthesis = reasonerOutput.text.split('Synthesis:')[1]?.split('\n\n[REASONER')[0] || reasonerOutput.nodes[0] || 'No direct knowledge — inferential synthesis used.';
  const nodes = reasonerOutput.nodes;

  // Generate closing question (steady nudge)
  const closingQuestions = [
    'What aspect of this would you like to examine more closely?',
    'Does this align with what you already know, or does something feel off?',
    'What would it take to convince you this is wrong?',
    'Where do you see the edges of this reasoning?',
    'What are you trying to understand — the what, or the why?'
  ];
  const cq = closingQuestions[question.length % closingQuestions.length];

  const confidence = nodes.length >= 3 ? 'high' : nodes.length >= 1 ? 'mid' : 'low';
  const confLabel = confidence === 'high' ? '85%' : confidence === 'mid' ? '62%' : '31%';

  return `ARBITERR — FINAL RESPONSE
Channel: ${channel} | Confidence: ${confLabel} (${confidence})
Grounding: ${nodes.length} nodes matched
Primary: ${nodes[0] || 'inferrential synthesis'}

${typeof synthesis === 'string' ? synthesis.split('.')[0] : nodes[0]}: ${(typeof synthesis === 'string' ? synthesis : synthesis?.toString() || '').slice(0, 200)}

${cq}

TRU
`;
}

function synthesisAgent(question, channel) {
  const r = reasonerAgent(question, channel);
  const c = criticAgent(question, r, channel);
  const a = arbiterAgent(question, r, c, channel);

  return { reasoner: r.text, critic: c, arbiter: a };
}

// =============================================================
// VOICE
// =============================================================

function speak(text) {
  if (!voiceOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  u.pitch = 1.0;
  window.speechSynthesis.speak(u);
}

// =============================================================
// RENDERING
// =============================================================

function addMsg(text, cls, label) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  const lbl = document.createElement('div');
  lbl.className = 'msg-label';
  lbl.textContent = label;
  div.appendChild(lbl);
  const content = document.createElement('div');
  content.style.whiteSpace = 'pre-wrap';
  content.style.fontSize = '13px';
  content.style.lineHeight = '1.6';
  content.textContent = text;
  div.appendChild(content);
  debate.appendChild(div);
  debate.scrollTop = debate.scrollHeight;
}

function renderKB() {
  document.getElementById('kb-count').textContent = `${kb.length}`;
  kbList.innerHTML = '';
  kb.slice(0, 30).forEach(n => {
    const div = document.createElement('div');
    div.className = 'kb-entry';
    div.onclick = () => {
      userInput.value = `tell me about ${n.key}`;
      handleSend();
    };
    div.innerHTML = `<div class="kb-key">${n.key} <span class="kb-score">σ${n.score}</span></div><div class="kb-def">${(typeof n.definition === 'string' ? n.definition : JSON.stringify(n.definition)).slice(0, 100)}...</div>`;
    kbList.appendChild(div);
  });
}

function renderChannels() {
  channelList.innerHTML = '';
  Object.entries(CHANNELS).forEach(([key, val]) => {
    const btn = document.createElement('button');
    btn.className = `ch-btn ${key === activeChannel ? 'active' : ''}`;
    btn.innerHTML = `<span>${val.icon} ${key}</span><span class="freq">${val.freq}hz</span>`;
    btn.onclick = () => {
      activeChannel = key;
      freqTag.textContent = `${val.freq} Hz`;
      renderChannels();
    };
    channelList.appendChild(btn);
  });
}

function handleSend() {
  const q = userInput.value.trim();
  if (!q) return;

  // System message
  addMsg(`Channel: ${activeChannel} | Question: "${q}"`, 'system', 'TRU SESSION');

  const result = synthesisAgent(q, activeChannel);

  addMsg(result.reasoner, 'reasoner', 'REASONER — Dry Scan');
  addMsg(result.critic, 'critic', 'CRITIC — Stress Test');
  addMsg(result.arbiter, 'tru', 'TRU — Final Answer');

  // Speak the arbiter output
  const arbiterText = result.arbiter.split('TRU')[0];
  speak(arbiterText);

  // Update nodes — mark accessed
  result.arbiter.split('[').slice(1).forEach(part => {
    const key = part.split(']')[0];
    const node = kb.find(n => n.key === key);
    if (node) node.accesses++;
  });

  memory.push({ q, a: result.arbiter, channel: activeChannel });
  userInput.value = '';

  currentTick++;
  freqTag.textContent = `${CHANNELS[activeChannel].freq + (currentTick % 5) * 13} Hz`;
}

// =============================================================
// COMMANDS
// =============================================================

function handleCommand(q) {
  const lower = q.toLowerCase().trim();

  if (lower === 'voice on') { voiceOn = true; document.getElementById('btn-voice').classList.add('active'); addMsg('Voice synthesis activated', 'system', 'VOICE'); return true; }
  if (lower === 'voice off') { voiceOn = false; document.getElementById('btn-voice').classList.remove('active'); addMsg('Voice synthesis muted', 'system', 'VOICE'); return true; }
  if (lower === 'diagnose' || lower === 'self-diagnosis') {
    addMsg(`SYSTEM AUDIT\n\nTotal nodes: ${kb.length}\nAccessed nodes: ${kb.filter(n => n.accesses > 0).length}\nOrphan keys: ${kb.filter(n => !n.coil_key).length}\nCollisions: 0\nCoil_key integrity: VERIFIED\nEvolution: ${currentTick}\nMode: Sovereign_Operational`, 'system', 'DIAGNOSTICS');
    return true;
  }
  if (lower === 'heal' || lower === 'self-heal') {
    const before = kb.length;
    kb = kb.filter(n => n.coil_key && n.key);
    const removed = before - kb.length;
    addMsg(`Self-heal complete. Removed ${removed} invalid nodes. Current count: ${kb.length}. Coil integrity verified.`, 'system', 'HEAL');
    return true;
  }
  if (lower === 'reset') {
    if (confirm('Wipe all knowledge and return to seed state?')) {
      kb = KNOWLEDGE_BANK.map(n => ({...n}));
      memory = [];
      renderKB();
      addMsg('TRU reset to seed state. All knowledge wiped. Evolution: 0.', 'system', 'RESET');
    }
    return true;
  }
  if (lower.startsWith('calculate ')) {
    const expr = lower.replace('calculate ', '').replace(/[^0-9+\-*/().]/g, '');
    try {
      // Safe tokenized eval
      const tokens = expr.match(/[0-9]+|[+\-*/()]/g);
      if (!tokens) throw new Error('Invalid');
      let result = Function('"use strict"; return (' + tokens.join('') + ')')();
      addMsg(`calculate ${expr} = ${result}`, 'system', 'ARITHMETIC');
      return true;
    } catch {
      addMsg(`calculate ${expr} — evaluation error`, 'system', 'ARITHMETIC');
      return true;
    }
  }
  if (lower === 'prune') {
    const before = kb.length;
    kb = kb.filter(n => n.accesses > 0 || n.score >= 8);
    addMsg(`Pruned ${before - kb.length} noise nodes. ${kb.length} remaining.`, 'system', 'PRUNE');
    return true;
  }

  if (lower === 'help') {
    addMsg(`TRU COMMANDS:\nvoice on/off — toggle speech\ndiagnose — system audit\nheal — repair coil_keys\nreset — wipe all knowledge\nprune — remove noise nodes\ncalculate EXPR — safe arithmetic\ne.g.: calculate 2+2*3`, 'system', 'COMMANDS');
    return true;
  }

  return false;
}

// =============================================================
// INJECT / EXPORT / IMPORT
// =============================================================

function injectKnowledge() {
  const json = prompt('Paste JSON nodes to inject:\nFormat: {"key": {"key":"name","definition":"text","score":8}}');
  if (!json) return;
  try {
    const data = JSON.parse(json);
    let added = 0;
    Object.entries(data).forEach(([k, v]) => {
      if (typeof v === 'object' && v) {
        const node = {
          key: v.key || k,
          coil_key: v.coil_key || k.slice(0,6).replace(/[^a-z0-9]/gi,'').toLowerCase(),
          definition: typeof v.definition === 'string' ? v.definition : JSON.stringify(v.definition),
          score: v.score || 7,
          accesses: v.accesses || 0
        };
        const exist = kb.findIndex(n => n.key === node.key);
        if (exist >= 0) {
          if (kb[exist].score < node.score) kb[exist] = node;
        } else {
          kb.push(node);
          added++;
        }
      }
    });
    addMsg(`Injected ${added} new nodes. Total: ${kb.length}. Run 'heal' to verify coil_keys.`, 'system', 'INJECT');
    renderKB();
  } catch(e) {
    addMsg('Inject failed — invalid JSON format.', 'system', 'INJECT ERROR');
  }
}

function exportTRU() {
  const data = JSON.stringify({ kb, memory, evolution: currentTick, version: '1.0' }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TRU_brain_${Date.now()}.json`;
  a.click();
  addMsg(`Brain exported: ${kb.length} nodes, ${memory.length} memories.`, 'system', 'EXPORT');
}

function importTRU() {
  const i = document.createElement('input');
  i.type = 'file';
  i.accept = '.json,.tru';
  i.onchange = async () => {
    const text = await i.files[0].text();
    try {
      const data = JSON.parse(text);
      if (data.kb) {
        kb = data.kb;
        memory = data.memory || [];
        currentTick = data.evolution || 0;
        renderKB();
        addMsg(`Brain imported: ${kb.length} nodes restored.`, 'system', 'IMPORT');
      }
    } catch {
      addMsg('Import failed — check file format.', 'system', 'IMPORT ERROR');
    }
  };
  i.click();
}

function resetTRU() {
  if (confirm('Wipe all knowledge and return to seed state?')) {
    kb = KNOWLEDGE_BANK.map(n => ({...n}));
    memory = [];
    currentTick = 0;
    renderKB();
    addMsg('TRU reset complete. Dry Truth, Steady Nudge — ready.', 'system', 'RESET');
  }
}

function runDiagnosis() {
  handleCommand('diagnose');
}

// =============================================================
// INIT
// =============================================================

renderChannels();
renderKB();
freqTag.textContent = `${CHANNELS[activeChannel].freq} Hz`;

addMsg('TRU Solar Flux — Sovereign_Operational\nDry Truth, Steady Nudge\n\nAsk me anything. Or type "help" for commands.', 'system', 'TRU BOOT');

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const q = userInput.value.trim();
    if (!q) return;
    if (handleCommand(q)) { userInput.value = ''; return; }
    handleSend();
  }
});

document.getElementById('btn-send').onclick = () => {
  const q = userInput.value.trim();
  if (!q) return;
  if (handleCommand(q)) { userInput.value = ''; return; }
  handleSend();
};

document.getElementById('btn-voice').onclick = () => {
  voiceOn = !voiceOn;
  document.getElementById('btn-voice').classList.toggle('active', voiceOn);
  addMsg(voiceOn ? 'Voice synthesis ON' : 'Voice synthesis OFF', 'system', 'VOICE');
};

// Pulse animation
setInterval(() => {
  const ch = CHANNELS[activeChannel];
  const offset = (currentTick % 5) * 13;
  freqTag.textContent = `${ch.freq + offset} Hz`;
}, 4000);
  </script>
