<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TRU Solar — Online</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0a0a0f;color:#e8e8f0;min-height:100vh}
nav{background:#111118;padding:12px 20px;border-bottom:1px solid #222;display:flex;gap:20px;align-items:center}
nav h1{color:#d4a574;font-size:1.1rem;font-weight:600}
.badge{background:#1a3a2a;color:#4ade80;font-size:0.65rem;padding:2px 8px;border-radius:10px}
#app{max-width:800px;margin:0 auto;padding:20px}
.query-box{display:flex;gap:10px;margin:20px 0}
#q{flex:1;padding:12px 16px;background:#111118;border:1px solid #2a2a35;border-radius:8px;color:#e8e8f0;font-size:1rem}
#q:focus{outline:none;border-color:#d4a574}
button{padding:12px 24px;background:#d4a574;color:#0a0a0f;border:none;border-radius:8px;font-weight:600;cursor:pointer}
button:hover{background:#e8b888}
#res{margin-top:20px;padding:16px;background:#111118;border-radius:8px;min-height:200px;white-space:pre-wrap;font-size:0.9rem;line-height:1.6}
.agent{margin-bottom:12px}
.agent-label{color:#d4a574;font-weight:600;font-size:0.8rem;margin-bottom:4px}
.conf{color:#4ade80;font-size:0.75rem;margin-top:4px}
.channels{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
.ch{background:#1a1a24;padding:4px 10px;border-radius:6px;font-size:0.75rem;cursor:pointer;border:1px solid transparent}
.ch:hover{border-color:#d4a574}
.ch.active{border-color:#d4a574;background:#1a2a20}
#pulse{margin:10px 0;font-size:0.8rem;color:#888}
</style>
</head>
<body>
<nav>
  <h1>TRU SOLAR</h1>
  <span class="badge">ONLINE</span>
</nav>
<div id="app">
  <div id="pulse">connecting...</div>
  <div class="channels">
    <span class="ch active" data-ch="all">all</span>
    <span class="ch" data-ch="news">news</span>
    <span class="ch" data-ch="science">science</span>
    <span class="ch" data-ch="philosophy">philosophy</span>
    <span class="ch" data-ch="history">history</span>
    <span class="ch" data-ch="tech">tech</span>
    <span class="ch" data-ch="health">health</span>
    <span class="ch" data-ch="culture">culture</span>
  </div>
  <div class="query-box">
    <input id="q" placeholder="ask TRU anything..."/>
    <button onclick="ask()">ask</button>
  </div>
  <div id="res">TRU is ready. ask a question to begin reasoning.</div>
</div>
<script>
let channel = 'all';
let mem = [];

document.querySelectorAll('.ch').forEach(function(el) {
  el.addEventListener('click', function() {
    document.querySelectorAll('.ch').forEach(function(e) { e.classList.remove('active'); });
    el.classList.add('active');
    channel = el.dataset.ch;
  });
});

function fmt(r) {
  if (!r) return '';
  return (r.reasoner ? '<div class="agent"><div class="agent-label">REASONER</div>' + r.reasoner + '</div>' : '')
       + (r.critic   ? '<div class="agent"><div class="agent-label">CRITIC</div>' + r.critic + '</div>' : '')
       + (r.arbiter  ? '<div class="agent"><div class="agent-label">ARBITER</div>' + r.arbiter + '</div>' : '')
       + (r.feed     ? '<div class="agent"><div class="agent-label">FEED — ' + channel + '</div>' + r.feed.slice(0,500) + '</div>' : '')
       + (r.final    ? '<div class="agent" style="border-top:1px solid #2a2a35;margin-top:8px;padding-top:8px"><div class="agent-label">FINAL</div>' + r.final + '</div>' : '')
       + (r.confidence !== undefined ? '<div class="conf">confidence: ' + r.confidence + '%</div>' : '');
}

async function ask() {
  var q = document.getElementById('q').value.trim();
  if (!q) return;
  document.getElementById('res').textContent = 'reasoning...';
  try {
    var r = await fetch('/api/tru/query', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({q: q, channel: channel, memory: mem})
    }).then(function(res) { return res.json(); });
    document.getElementById('res').innerHTML = fmt(r);
    if (r.final) mem.push({q: q, a: r.final});
  } catch(e) {
    document.getElementById('res').textContent = 'error: ' + e.message;
  }
}

document.getElementById('q').addEventListener('keydown', function(e) { if (e.key === 'Enter') ask(); });

(async function() {
  try {
    var p = await fetch('/api/tru/pulse').then(function(res) { return res.json(); });
    document.getElementById('pulse').innerHTML = '<b>TRU ONLINE</b> — tick:' + p.tick + ' | freq:' + p.freq + 'hz | resonance:' + p.resonance + ' | channels:23 | live:3';
  } catch(e) {
    document.getElementById('pulse').textContent = 'TRU offline — connect to talk';
  }
})();
</script>
</body>
</html>
